<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- subtle hue band top right -->
  <g opacity="0.18">
    <rect x="0"    y="0" width="100" height="630" fill="#fb6ca0"/>
    <rect x="100"  y="0" width="100" height="630" fill="#ff715d"/>
    <rect x="200"  y="0" width="100" height="630" fill="#f38300"/>
    <rect x="300"  y="0" width="100" height="630" fill="#d09c00"/>
    <rect x="400"  y="0" width="100" height="630" fill="#97b300"/>
    <rect x="500"  y="0" width="100" height="630" fill="#32c364"/>
    <rect x="600"  y="0" width="100" height="630" fill="#00c7a9"/>
    <rect x="700"  y="0" width="100" height="630" fill="#00c0e2"/>
    <rect x="800"  y="0" width="100" height="630" fill="#00b0ff"/>
    <rect x="900"  y="0" width="100" height="630" fill="#7a9bff"/>
    <rect x="1000" y="0" width="100" height="630" fill="#b786ff"/>
    <rect x="1100" y="0" width="100" height="630" fill="#e175d9"/>
  </g>

  <!-- vertical fade overlay -->
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#0a0a0a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- logo -->
  <g transform="translate(80, 70)">
    <rect width="40" height="40" rx="9" fill="#00b6fe"/>
    <text x="55" y="29" font-size="24" font-weight="600" fill="#f5f5f5" letter-spacing="-0.4">
      okay<tspan fill="#7a7a7a">.tools</tspan>
    </text>
  </g>

  <!-- headline -->
  <text x="80" y="290" font-size="86" font-weight="600" letter-spacing="-2.5" fill="#f5f5f5">
    Colour is finally OK.
  </text>
  <text x="80" y="385" font-size="86" font-weight="600" letter-spacing="-2.5" fill="#7a7a7a">
    Here are the tools.
  </text>

  <!-- subline -->
  <text x="80" y="465" font-size="26" fill="#b7b7b7">
    Free OKLCH-native utilities for designers and developers.
  </text>

  <!-- ramp strip -->
  <g transform="translate(80, 520)">
    <rect x="0"    width="93" height="14" rx="3" fill="#f7fbfd"/>
    <rect x="100"  width="93" height="14" rx="3" fill="#dbebf3"/>
    <rect x="200"  width="93" height="14" rx="3" fill="#a9d9f1"/>
    <rect x="300"  width="93" height="14" rx="3" fill="#64c4f0"/>
    <rect x="400"  width="93" height="14" rx="3" fill="#00aeee"/>
    <rect x="500"  width="93" height="14" rx="3" fill="#0096e5"/>
    <rect x="600"  width="93" height="14" rx="3" fill="#007cc1"/>
    <rect x="700"  width="93" height="14" rx="3" fill="#006097"/>
    <rect x="800"  width="93" height="14" rx="3" fill="#00456b"/>
    <rect x="900"  width="93" height="14" rx="3" fill="#00263c"/>
    <rect x="1000" width="93" height="14" rx="3" fill="#000911"/>
  </g>

  <text x="80" y="585" font-size="16" font-family="JetBrains Mono, ui-monospace, monospace" fill="#7a7a7a" letter-spacing="2">
    OKAY.TOOLS  ·  BY PAWEL KLASA
  </text>
</svg>
